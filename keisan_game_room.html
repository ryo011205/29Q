<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>計算ゲーム</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:#F0E8D8;display:flex;justify-content:center;min-height:100vh;padding:16px;}
#app{width:100%;max-width:460px;}

.room{
  position:relative;border-radius:20px;overflow:hidden;
  border:3px solid #C4904A;
  background:#FFF6EA;
  padding:10px 14px 14px;
  min-height:500px;
}

/* 壁（上部） */
.wall-top{
  position:absolute;top:0;left:0;right:0;height:56px;
  background:#FFE8C0;
  border-bottom:3px solid #C4904A;
  z-index:0;
}
/* 壁紙ドット模様 */
.wall-top::before{
  content:'';position:absolute;inset:0;
  background-image:radial-gradient(circle, #D4A06088 1.5px, transparent 1.5px);
  background-size:18px 18px;
}

/* 床 */
.floor{
  position:absolute;bottom:0;left:0;right:0;height:26px;
  background:#C08040;
  border-top:3px solid #9A6020;
  z-index:0;
}
/* 床の板目 */
.floor::before{
  content:'';position:absolute;inset:0;
  background-image:repeating-linear-gradient(90deg,transparent,transparent 60px,#A06830 60px,#A06830 61px);
}

/* 窓 */
.window{
  position:absolute;top:5px;right:52px;
  width:50px;height:44px;
  background:#C0E8F8;
  border:2.5px solid #6AAAC8;
  border-radius:4px 4px 0 0;
  z-index:1;
  overflow:hidden;
}
.window::before{content:'';position:absolute;left:50%;top:0;bottom:0;width:2px;background:#6AAAC8;}
.window::after{content:'';position:absolute;top:50%;left:0;right:0;height:2px;background:#6AAAC8;}
/* カーテン */
.curtain-l,.curtain-r{position:absolute;top:0;width:10px;bottom:0;background:#F4A0A0;z-index:2;}
.curtain-l{left:0;border-radius:0 0 6px 0;}
.curtain-r{right:0;border-radius:0 0 0 6px;}
/* 太陽 */
.sun{
  position:absolute;top:8px;right:12px;
  width:18px;height:18px;
  background:#FFD040;
  border-radius:50%;
  border:2px solid #E0A800;
  z-index:2;
}

/* 本棚 */
.shelf{
  position:absolute;top:4px;left:8px;
  width:46px;height:46px;
  background:#B07040;
  border:2.5px solid #805020;
  border-radius:5px 5px 0 0;
  z-index:1;
  display:flex;flex-direction:column;justify-content:flex-end;
  gap:2px;padding:3px 2px 2px;
}
.book{width:100%;height:8px;border-radius:2px;}

/* 植木鉢 */
.plant{
  position:absolute;bottom:1px;left:10px;
  font-size:22px;z-index:4;line-height:1;
}

/* スタート画面の猫 */
.deco-cat{
  position:absolute;bottom:1px;right:12px;
  font-size:22px;z-index:4;line-height:1;
}

/* ゲームUI */
.ui{position:relative;z-index:5;}
.screen{display:none;}.screen.active{display:block;}

/* カード */
.card{
  background:rgba(255,255,255,0.88);
  border:2px solid #D4A060;
  border-radius:16px;
  padding:12px 14px;
  margin-bottom:10px;
}

h1{font-size:22px;font-weight:700;color:#7A3A10;text-align:center;margin-bottom:4px;}
.sub{font-size:13px;color:#A06030;text-align:center;margin-bottom:10px;}
.slbl{font-size:12px;color:#906030;font-weight:600;text-align:center;margin-bottom:6px;}

.op-row{display:flex;gap:6px;justify-content:center;margin-bottom:10px;}
.ob{
  padding:7px 16px;font-size:20px;
  background:#FFF4E8;border:2px solid #C4904A;
  border-radius:10px;cursor:pointer;color:#7A3A10;font-weight:700;
  transition:all 0.1s;
}
.ob.on{border-color:#C04A10;color:#C04A10;background:#FFE0C8;}

.fbs{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;margin-bottom:10px;}
.fb{
  padding:4px 9px;font-size:13px;
  background:#FFF4E8;border:2px solid #C4904A;
  border-radius:8px;cursor:pointer;color:#7A3A10;
}
.fb.on{border-color:#C04A10;color:#C04A10;background:#FFE0C8;}

.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.mc{
  padding:10px 8px;
  background:#FFF4E8;border:2px solid #C4904A;
  border-radius:12px;cursor:pointer;text-align:center;
  transition:border-color 0.1s;
}
.mc:hover{border-color:#C04A10;}
.mc.sel{border-color:#C04A10;background:#FFE0C8;}
.mn{font-size:14px;font-weight:700;color:#7A3A10;margin-bottom:3px;}
.md{font-size:11px;color:#A06030;}

.sbtn{
  display:block;width:100%;padding:13px;
  font-size:15px;font-weight:700;
  background:#D05828;color:#fff;
  border:none;border-radius:12px;cursor:pointer;
  transition:background 0.1s;
}
.sbtn:hover{background:#A03A10;}
.sbtn:disabled{background:#C4A080;cursor:default;}

/* HUD */
.hud{display:flex;justify-content:space-between;margin-bottom:8px;}
.hi{text-align:center;}
.hl{font-size:10px;color:#906030;font-weight:600;}
.hv{font-size:19px;font-weight:700;color:#7A3A10;}

/* タイムバー＋猫人 */
.bscene{position:relative;height:46px;margin-bottom:7px;}
.btrack{position:absolute;top:30px;left:0;right:0;height:7px;background:#E0C090;border-radius:4px;}
.bfill{position:absolute;top:30px;left:0;height:7px;border-radius:4px;background:#D05828;transition:none;}
.bfill.danger{background:#C02020;}
.catc{position:absolute;top:0;font-size:22px;transform:translateX(-50%);user-select:none;line-height:1;}
.perc{position:absolute;top:3px;font-size:20px;transform:translateX(-50%);user-select:none;line-height:1;transition:left 0.35s ease;}

.pw{height:5px;background:#E0C090;border-radius:3px;margin-bottom:7px;}
.pb{height:5px;background:#50A820;border-radius:3px;transition:width 0.3s;}

/* 問題ボックス */
.qbox{
  background:rgba(255,255,255,0.92);
  border:2px solid #D4A060;
  border-radius:16px;
  padding:14px 12px;text-align:center;margin-bottom:6px;
}
.qt{font-size:34px;font-weight:700;color:#5A2010;}
.ad{
  font-size:26px;font-weight:700;color:#7A3A10;
  min-height:36px;letter-spacing:2px;margin-top:5px;
}
.ad.cf{color:#208030;}.ad.wf{color:#C02020;}

/* フィードバック */
.fbk{text-align:center;font-size:16px;font-weight:600;height:24px;margin-bottom:4px;color:#7A3A10;}
.fbk.ok{color:#208030;}.fbk.ng{color:#C02020;}

/* 数字キー */
.np{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:4px;}
.nb{
  padding:15px 6px;font-size:22px;font-weight:700;
  background:rgba(255,255,255,0.88);
  border:2px solid #C4904A;
  border-radius:12px;cursor:pointer;color:#5A2010;
  -webkit-tap-highlight-color:transparent;user-select:none;
  transition:transform 0.08s;
}
.nb:active{background:#FFE0C8;transform:scale(0.93);}
.nb.dl{font-size:16px;color:#906030;}
.nb.en{background:#D05828;color:#fff;border-color:#D05828;}
.nb.en:active{background:#A03A10;}

/* リザルト */
.ra{text-align:center;padding:0.8rem 0 1.2rem;}
.bn{font-size:52px;font-weight:700;color:#7A3A10;}
.rm{font-size:18px;color:#5A2010;margin:6px 0 0.8rem;}
.ci,.fi{
  width:160px;height:120px;border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 0.8rem;font-size:44px;border:2px solid;
}
.ci{background:#FFE8D0;border-color:#D4A060;}
.fi{background:#FFEEEE;border-color:#F0A0A0;}
.sr{display:flex;justify-content:center;gap:2rem;margin-bottom:1rem;}
.sv{font-size:20px;font-weight:700;color:#7A3A10;}
.sl{font-size:11px;color:#906030;}
.br{display:flex;gap:8px;justify-content:center;}
.xb{
  padding:9px 22px;font-size:13px;
  background:rgba(255,255,255,0.85);
  border:2px solid #C4904A;
  border-radius:10px;cursor:pointer;color:#7A3A10;
}
.xb:hover{background:#FFE8D0;}
</style>
</head>
<body>
<div id="app">
<div class="room">

  <div class="wall-top"></div>
  <div class="floor"></div>
  <div class="window"><div class="curtain-l"></div><div class="curtain-r"></div></div>
  <div class="sun"></div>
  <div class="shelf">
    <div class="book" style="background:#D05828;"></div>
    <div class="book" style="background:#50A820;"></div>
    <div class="book" style="background:#4080C0;"></div>
    <div class="book" style="background:#C4904A;"></div>
  </div>
  <div class="plant">🪴</div>
  <div class="deco-cat" id="dcat">🐈</div>

  <div class="ui">

    <div id="s-start" class="screen active" style="padding-top:52px;">
      <div class="card">
        <h1>🧮 計算ゲーム</h1>
        <p class="sub">タイムアタックに挑戦しよう！</p>
        <div class="slbl">計算の種類（1つ選ぼう）</div>
        <div class="op-row">
          <button class="ob on" id="op-add" onclick="pickOp('add')">＋</button>
          <button class="ob" id="op-sub" onclick="pickOp('sub')">－</button>
          <button class="ob" id="op-mul" onclick="pickOp('mul')">×</button>
          <button class="ob" id="op-div" onclick="pickOp('div')">÷</button>
        </div>
        <div class="slbl">かたほうの数を固定する（しない場合は「なし」）</div>
        <div class="fbs" id="fix-btns"></div>
        <div class="slbl">モードを選ぼう</div>
        <div class="mode-grid" id="mode-grid"></div>
        <button class="sbtn" id="start-btn" onclick="startGame()" disabled>モードを選んでスタート</button>
      </div>
    </div>

    <div id="s-game" class="screen" style="padding-top:52px;">
      <div class="hud">
        <div class="hi"><div class="hl">もんだい</div><div class="hv" id="g-qnum">1/10</div></div>
        <div class="hi"><div class="hl">のこり時間</div><div class="hv" id="g-timer">—</div></div>
        <div class="hi"><div class="hl">せいかい</div><div class="hv" id="g-correct">0</div></div>
      </div>
      <div class="bscene">
        <div class="btrack"></div>
        <div class="bfill" id="bar-fill" style="width:100%"></div>
        <div class="catc" id="cat-el" style="left:100%">🐈</div>
        <div class="perc" id="person-el" style="left:92%">🧒</div>
      </div>
      <div class="pw"><div class="pb" id="prog-bar" style="width:0%"></div></div>
      <div class="qbox">
        <div class="qt" id="g-qtext"></div>
        <div class="ad" id="ans-display">▢</div>
      </div>
      <div class="fbk" id="feedback"></div>
      <div class="np">
        <button class="nb" onclick="ni('7')">7</button>
        <button class="nb" onclick="ni('8')">8</button>
        <button class="nb" onclick="ni('9')">9</button>
        <button class="nb" onclick="ni('4')">4</button>
        <button class="nb" onclick="ni('5')">5</button>
        <button class="nb" onclick="ni('6')">6</button>
        <button class="nb" onclick="ni('1')">1</button>
        <button class="nb" onclick="ni('2')">2</button>
        <button class="nb" onclick="ni('3')">3</button>
        <button class="nb dl" onclick="nd()">⌫</button>
        <button class="nb" onclick="ni('0')">0</button>
        <button class="nb en" onclick="doSub()">→</button>
      </div>
    </div>

    <div id="s-result" class="screen" style="padding-top:52px;">
      <div class="card">

<script>
const MODES=[
  {id:'drill',name:'drill',desc:'順番に1〜10・時間なし',time:0},
  {id:'easy', name:'easy', desc:'10問で18秒・全問正解でクリア',time:18},
  {id:'hard', name:'hard', desc:'10問で15秒・全問正解でクリア',time:15},
  {id:'expert',name:'expert',desc:'10問で12秒・全問正解でクリア',time:12},
];
const SYM={add:'＋',sub:'－',mul:'×',div:'÷'};
let selOp='add',fixedNum=null,selMode=null;
let questions=[],cur=0,correct=0;
let totalMs=0,t0=0,rafID=null,ivID=null;
let locked=false,failed=false,inp='';
const TOTAL=10,PS=92,PE=4;
let pp=PS;

function pickOp(op){
  selOp=op;
  document.querySelectorAll('.ob').forEach(b=>b.classList.remove('on'));
  document.getElementById('op-'+op).classList.add('on');
  buildFix();
}
function buildFix(){
  const c=document.getElementById('fix-btns');c.innerHTML='';
  const n=document.createElement('button');
  n.className='fb on';n.textContent='なし';n.id='fn';n.onclick=()=>setF(null);c.appendChild(n);
  const mx=(selOp==='mul'||selOp==='div')?10:9;
  for(let i=1;i<=mx;i++){
    const b=document.createElement('button');b.className='fb';b.textContent=i;b.dataset.n=i;
    b.onclick=()=>setF(i);c.appendChild(b);
  }
  fixedNum=null;
}
function setF(n){
  fixedNum=n;
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));
  if(n===null)document.getElementById('fn').classList.add('on');
  else document.querySelectorAll('.fb[data-n="'+n+'"]').forEach(b=>b.classList.add('on'));
}
function initModes(){
  const g=document.getElementById('mode-grid');g.innerHTML='';
  MODES.forEach(m=>{
    const d=document.createElement('div');d.className='mc';d.id='mc-'+m.id;
    d.innerHTML='<div class="mn">'+m.name+'</div><div class="md">'+m.desc+'</div>';
    d.onclick=()=>{
      selMode=m;
      document.querySelectorAll('.mc').forEach(e=>e.classList.remove('sel'));
      d.classList.add('sel');
      const b=document.getElementById('start-btn');
      b.disabled=false;b.textContent=m.name+' でスタート！';
    };
    g.appendChild(d);
  });
}
function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function buildQs(drill){
  const op=selOp,pool=[],ns=Array.from({length:11},(_,i)=>i+1);
  if(drill){
    for(let n=1;n<=10;n++){
      let a,b,ans;
      if(op==='add'){a=fixedNum!=null?fixedNum:rand(1,11);b=n;ans=a+b;}
      else if(op==='sub'){b=n;a=(fixedNum!=null?fixedNum:rand(1,11))+b;ans=a-b;}
      else if(op==='mul'){a=fixedNum!=null?fixedNum:n;b=fixedNum!=null?n:rand(1,11);ans=a*b;}
      else{b=fixedNum!=null?fixedNum:rand(1,11);ans=n;a=b*ans;}
      pool.push({text:a+' '+SYM[op]+' '+b+' ＝',ans});
    }
    return pool;
  }
  if(op==='add'){
    const av=fixedNum!=null?[fixedNum]:ns;
    for(const a of av)for(const b of ns)pool.push({text:a+' ＋ '+b+' ＝',ans:a+b});
  }else if(op==='sub'){
    if(fixedNum!=null){for(const b of ns)if(fixedNum>=b)pool.push({text:fixedNum+' － '+b+' ＝',ans:fixedNum-b});}
    else{for(let a=2;a<=22;a++)for(const b of ns)if(a>b)pool.push({text:a+' － '+b+' ＝',ans:a-b});}
  }else if(op==='mul'){
    const av=fixedNum!=null?[fixedNum]:ns;
    for(const a of av)for(const b of ns)pool.push({text:a+' × '+b+' ＝',ans:a*b});
  }else{
    const bv=fixedNum!=null?[fixedNum]:ns;
    for(const b of bv)for(const ans of ns)pool.push({text:(b*ans)+' ÷ '+b+' ＝',ans});
  }
  shuffle(pool);
  const seen=new Set(),res=[];
  for(const q of pool){if(!seen.has(q.text)){seen.add(q.text);res.push(q);if(res.length>=TOTAL)break;}}
  while(res.length<TOTAL)res.push(pool[rand(0,pool.length-1)]);
  return res;
}
function startGame(){
  if(!selMode)return;
  questions=buildQs(selMode.id==='drill');
  cur=0;correct=0;failed=false;locked=false;inp='';pp=PS;
  document.getElementById('person-el').style.left=PS+'%';
  document.getElementById('cat-el').style.left='100%';
  const b=document.getElementById('bar-fill');b.style.width='100%';b.classList.remove('danger');
  show('s-game');
  if(selMode.time>0){totalMs=selMode.time*1000;t0=performance.now();startTimer();}
  else document.getElementById('g-timer').textContent='—';
  renderQ();
}
function startTimer(){
  cancelAnimationFrame(rafID);clearInterval(ivID);
  function tick(now){
    if(failed)return;
    const ratio=Math.max(0,1-(now-t0)/totalMs);
    const b=document.getElementById('bar-fill');
    b.style.width=(ratio*100)+'%';b.classList.toggle('danger',ratio<=0.2);
    const ce=document.getElementById('cat-el');
    const cl=parseFloat(ce.style.left)||100;
    const nl=ratio*100;
    if(nl<cl)ce.style.left=nl+'%';
    if(ratio<=0){timeOut();return;}
    rafID=requestAnimationFrame(tick);
  }
  rafID=requestAnimationFrame(tick);
  ivID=setInterval(()=>{
    const r=Math.max(0,Math.ceil((totalMs-(performance.now()-t0))/1000));
    document.getElementById('g-timer').textContent=r;
    if(r<=0)clearInterval(ivID);
  },100);
}
function renderQ(){
  locked=false;inp='';upd();clrFb();
  const q=questions[cur];
  document.getElementById('g-qtext').textContent=q.text;
  document.getElementById('g-qnum').textContent=(cur+1)+'/'+TOTAL;
  document.getElementById('g-correct').textContent=correct;
  document.getElementById('prog-bar').style.width=(cur/TOTAL*100)+'%';
}
function ni(n){if(locked||inp.length>=4)return;inp+=n;upd();}
function nd(){if(locked)return;inp=inp.slice(0,-1);upd();}
function upd(){const e=document.getElementById('ans-display');e.textContent=inp===''?'▢':inp;e.className='ad';}
function doSub(){
  if(locked||inp==='')return;
  const v=parseInt(inp,10),ans=questions[cur].ans;
  locked=true;
  if(v===ans){
    document.getElementById('ans-display').className='ad cf';
    setFb('⭕ せいかい！','ok');
    correct++;document.getElementById('g-correct').textContent=correct;
    pp=Math.max(PE,pp-(PS-PE)/TOTAL);
    document.getElementById('person-el').style.left=pp+'%';
    setTimeout(()=>{cur++;if(cur>=TOTAL)endGame();else{locked=false;renderQ();}},500);
  }else{
    failed=true;cancelAnimationFrame(rafID);clearInterval(ivID);
    document.getElementById('ans-display').className='ad wf';
    setFb('✕ まちがい… 正解は '+ans,'ng');
    setTimeout(()=>endGame(),1400);
  }
}
function timeOut(){
  if(locked||failed)return;
  locked=true;failed=true;cancelAnimationFrame(rafID);clearInterval(ivID);
  setFb('⏱ じかんきれ！ 正解は '+questions[cur].ans,'ng');
  setTimeout(()=>endGame(),1200);
}
function setFb(m,c){const e=document.getElementById('feedback');e.textContent=m;e.className='fbk '+c;}
function clrFb(){const e=document.getElementById('feedback');e.textContent='';e.className='fbk';}
function endGame(){
  cancelAnimationFrame(rafID);clearInterval(ivID);
  const cl=!failed&&correct===TOTAL;
  document.getElementById('r-score').textContent=correct;
  document.getElementById('r-acc').textContent=Math.round(correct/TOTAL*100)+'%';
  if(selMode.time>0){const r=Math.max(0,(totalMs-(performance.now()-t0))/1000).toFixed(1);document.getElementById('r-time').textContent=r+'秒';}
  else document.getElementById('r-time').textContent='—';
  document.getElementById('r-ci').style.display=cl?'flex':'none';
  // 2の段 × hard クリアなら白猫画像
  var isCatClear = cl && selMode && selMode.id==='hard' && fixedNum===2 && selOp==='mul';
  document.getElementById('r-ci-trophy').style.display = isCatClear ? 'none' : (cl ? 'inline' : 'none');
  document.getElementById('r-ci-cat').style.display = isCatClear ? 'block' : 'none';
  document.getElementById('r-fi').style.display=cl?'none':'flex';
  document.getElementById('r-msg').textContent=cl?'🎉 クリア！すごい！':'もう一度チャレンジ！';
  show('s-result');
}
function goStart(){cancelAnimationFrame(rafID);clearInterval(ivID);show('s-start');}
function retry(){cancelAnimationFrame(rafID);clearInterval(ivID);startGame();}
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById('dcat').style.display=(id==='s-start')?'block':'none';
}
buildFix();initModes();
</script>
